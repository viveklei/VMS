version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetops-postgres
    restart: always
    environment:
      POSTGRES_DB: vms_fleetops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fleetops-backend
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres_secure_password_2026@postgres:5432/vms_fleetops
      JWT_SECRET: super_secret_jwt_key_lei_fleetops_ai_2026
      JWT_REFRESH_SECRET: super_secret_refresh_jwt_key_lei_fleetops_ai_2026
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fleetops-frontend
    volumes:
      - web-assets:/var/www/frontend

  nginx:
    image: nginx:alpine
    container_name: fleetops-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - web-assets:/usr/share/nginx/html:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
  web-assets:
    driver: local
